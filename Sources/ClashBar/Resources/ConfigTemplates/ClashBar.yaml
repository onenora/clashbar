port: 0
socks-port: 0
redir-port: 0
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090

pr:
  &a3 {
    type: select,
    proxies:
      [
        ♻️ 自动选择,
        🚀 手动切换,
        ⚡️ 专线节点,
        📺 媒体节点,
        🇭🇰 香港节点,
        🇨🇳 台湾节点,
        🇺🇸 美国节点,
        🇺🇸 美国AN,
        🇯🇵 日本节点,
        🇪🇺 其他节点,
        🚀 搬瓦工点,
        DIRECT,
      ],
    interval: 300,
  }
oa:
  &a8 {
    type: select,
    proxies: [🇨🇳 台湾节点, 🇺🇸 美国节点, 🇺🇸 美国AN, 🇯🇵 日本节点, 🚀 搬瓦工点],
    interval: 300,
  }
go:
  &a9 {
    type: select,
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点],
    interval: 300,
  }
re: &a10 { type: select, proxies: [REJECT], interval: 300 }
p:
  &a1 {
    type: http,
    interval: 21600,
    health-check:
      {
        enable: true,
        url: http://wifi.vivo.com.cn/generate_204,
        interval: 300,
      },
  }
auto: &a4 {
    type: url-test,
    # lazy: true,
    url: http://cp.cloudflare.com,
    interval: 300,
    timeout: 3,
    # tolerance: 100,
    use: [proxy],
  }
use: &a2 { type: select, use: [proxy] }
d: &a5 { type: http, behavior: domain, interval: 86400 }
c: &a6 { type: http, behavior: classical, interval: 86400 }
i: &a7 { type: http, behavior: ipcidr, interval: 86400 }

geox-url:
  geoip: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat'
  geosite: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat'
  mmdb: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb'
  asn: 'https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb'

proxy-providers:
  proxy:
    <<: *a1
    url:
    path: ./proxy/proxy.yaml

proxy-groups:
  - { name: 🚀 手动切换, <<: *a2 }
  - { name: 🆎 AdBlock, <<: *a10 }
  - { name: 🍎 苹果服务, <<: *a3 }
  - { name: 💬 OpenAI, <<: *a8 }
  - { name: 🤖 Cloudflare, <<: *a3 }
  - { name: 🌌 谷歌服务, <<: *a3 }
  - { name: Ⓜ️ 微软服务, <<: *a3 }
  - { name: 👨🏻‍💻 GitHub, <<: *a3 }
  - { name: 📟 国外社交, <<: *a3 }
  - { name: 🎥 国外视频, <<: *a3 }
  - { name: 🐟 漏网之鱼, <<: *a3 }

  - { name: ♻️ 自动选择, <<: *a4 }
  - { name: ⚡️ 专线节点, <<: *a4, filter: '专线' }
  - { name: 📺 媒体节点, <<: *a4, filter: '\[M\]' }
  - { name: 🚀 搬瓦工点, <<: *a4, filter: 'JMS' }
  - { name: 🇭🇰 香港节点, <<: *a4, filter: '🇭🇰|HK|香港' }
  - { name: 🇨🇳 台湾节点, <<: *a4, filter: '🇨🇳|TW|台湾' }
  - { name: 🇺🇸 美国节点, <<: *a4, filter: '🇺🇸|US|美国' }
  - { name: 🇺🇸 美国AN, <<: *a4, filter: '(?:🇺🇸|US|美国).*AN' }
  - { name: 🇯🇵 日本节点, <<: *a4, filter: '🇯🇵|JP|日本' }
  - {
      name: 🇪🇺 其他节点,
      <<: *a4,
      filter: '🇫🇷|FR|法国|🇩🇪|DE|德国|🇬🇧|UK|英国|🇸🇬|SG|新加',
    }

