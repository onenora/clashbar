name: Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  swiftformat:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check Swift format
        run: swiftformat --lint .

  build:
    env:
      MIHOMO_VERSION: v1.19.20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_arch: arm64
          - target_arch: x86_64
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          if ! swift --version | grep -Eq 'Swift version (6\.[2-9]|[7-9]\.)'; then
            echo "Swift 6.2+ is required by Package.swift (// swift-tools-version: 6.2)." >&2
            exit 1
          fi

      - name: Build app
        shell: bash
        run: |
          TARGET_ARCH="${{ matrix.target_arch }}" \
          ./Scripts/build.sh app
