name: Release DMG

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional explicit tag (v1.2.3 or 1.2.3). Leave empty to auto-increment.'
        required: false
        type: string
      bump:
        description: 'Version bump when tag is empty.'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  prepare-version:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
          INPUT_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail

          extract_version() {
            local raw="$1"
            if [[ "$raw" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]}"
              return 0
            fi
            return 1
          }

          normalize_manual_tag() {
            local raw="$1"
            if ! extract_version "$raw" >/dev/null; then
              return 1
            fi
            echo "$raw"
          }

          tag=""
          version=""

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            if ! version="$(extract_version "$tag")"; then
              echo "Tag '$tag' is not valid (expected v1.2.3 or 1.2.3)." >&2
              exit 1
            fi
          else
            git fetch --tags --force

            if [[ -n "${INPUT_TAG:-}" ]]; then
              if ! tag="$(normalize_manual_tag "$INPUT_TAG")"; then
                echo "Input tag '$INPUT_TAG' is not valid (expected v1.2.3 or 1.2.3)." >&2
                exit 1
              fi
              version="$(extract_version "$tag")"
            else
              last_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
              base_version="0.0.0"
              range="HEAD"
              if [[ -n "$last_tag" ]]; then
                base_version="${last_tag#v}"
                range="${last_tag}..HEAD"
              fi

              bump="${INPUT_BUMP:-auto}"
              if [[ "$bump" == "auto" || -z "$bump" ]]; then
                commit_lines="$(git log --format='%s%n%b' $range)"
                bump=""
                if grep -Eq 'BREAKING CHANGE|^[^[:space:]]+(\([^)]+\))?!:' <<< "$commit_lines"; then
                  bump="major"
                elif grep -Eq '^feat(\([^)]+\))?:' <<< "$commit_lines"; then
                  bump="minor"
                elif grep -Eq '^(fix|perf|refactor|build|ci|revert|chore|docs|style|test)(\([^)]+\))?:' <<< "$commit_lines"; then
                  bump="patch"
                fi

                if [[ -z "$bump" ]]; then
                  echo "No releasable commits found since ${last_tag:-repository start}. Set bump manually." >&2
                  exit 1
                fi
              fi

              if [[ "$bump" != "major" && "$bump" != "minor" && "$bump" != "patch" ]]; then
                echo "Unsupported bump type: $bump" >&2
                exit 1
              fi

              IFS='.' read -r major minor patch <<< "$base_version"
              case "$bump" in
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                patch)
                  patch=$((patch + 1))
                  ;;
              esac
              tag="v${major}.${minor}.${patch}"
              version="${major}.${minor}.${patch}"
              echo "Auto-calculated tag: $tag (bump: $bump, base: ${last_tag:-none})"
            fi

            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
              echo "Tag ${tag} already exists on origin, reusing it."
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$tag"
              git push origin "$tag"
              echo "Created and pushed tag: $tag"
            fi
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${version}" >> "$GITHUB_OUTPUT"

  build-dmg:
    needs: prepare-version
    env:
      MIHOMO_VERSION: v1.19.20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_arch: arm64
            dmg_suffix: apple-silicon
            artifact_name: dmg-arm64
            bundle_mihomo_binary: '1'
          - target_arch: arm64
            dmg_suffix: apple-silicon-no-core
            artifact_name: dmg-arm64-no-core
            bundle_mihomo_binary: '0'
          - target_arch: x86_64
            dmg_suffix: intel
            artifact_name: dmg-x86_64
            bundle_mihomo_binary: '1'
          - target_arch: x86_64
            dmg_suffix: intel-no-core
            artifact_name: dmg-x86_64-no-core
            bundle_mihomo_binary: '0'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.tag }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          if ! swift --version | grep -Eq 'Swift version (6\.[2-9]|[7-9]\.)'; then
            echo "Swift 6.2+ is required by Package.swift (// swift-tools-version: 6.2)." >&2
            exit 1
          fi

      - name: Build app
        shell: bash
        run: |
          APP_VERSION="${{ needs.prepare-version.outputs.version }}" \
          BUILD_NUMBER="${{ needs.prepare-version.outputs.build_number }}" \
          PREPARE_MIHOMO_BINARY="${{ matrix.bundle_mihomo_binary }}" \
          BUNDLE_MIHOMO_BINARY="${{ matrix.bundle_mihomo_binary }}" \
          TARGET_ARCH="${{ matrix.target_arch }}" \
          ./Scripts/build.sh app

      - name: Build dmg
        shell: bash
        run: |
          APP_VERSION="${{ needs.prepare-version.outputs.version }}" \
          DMG_SUFFIX="${{ matrix.dmg_suffix }}" \
          ./Scripts/build.sh dmg

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/ClashBar-${{ needs.prepare-version.outputs.version }}-${{ matrix.dmg_suffix }}.dmg
            dist/ClashBar-${{ needs.prepare-version.outputs.version }}-${{ matrix.dmg_suffix }}.dmg.sha256
          if-no-files-found: error

  release:
    needs: [prepare-version, build-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.tag }}

      - name: Download dmg artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true
          path: dist

      - name: Generate release body
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x Scripts/generate_release_notes.sh
          Scripts/generate_release_notes.sh \
            "${{ needs.prepare-version.outputs.tag }}" \
            "${{ needs.prepare-version.outputs.version }}" \
            release.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-version.outputs.tag }}
          name: ClashBar ${{ needs.prepare-version.outputs.version }}
          body_path: release.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
