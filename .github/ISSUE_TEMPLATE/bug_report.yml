name: 错误反馈
description: '提交 ClashBar Bug'
title: '[Bug] '
labels: ['bug']
body:
  - type: checkboxes
    id: ensure
    attributes:
      label: 验证步骤
      description: 在提交之前，请勾选以下选项以证明您已经阅读并理解了以下要求，否则该 issue 将被关闭。
      options:
        - label: 我已在 [Issue Tracker](https://github.com/Sitoi/ClashBar/issues) 中搜索过相同或类似问题，没有找到已有记录。
          required: false
        - label: 应用已放置于 `/Applications/ClashBar.app`，而非直接从 DMG 或其他目录运行（系统代理功能依赖此路径）。
          required: true
        - label: 我同一时间只保留一个 mihomo / Clash 系客户端接管系统代理，已退出 ClashX、Clash Verge、Clash Nyanpasu、Clash Party、FlClash 等同类软件。
          required: true
        - label: 我已在 **系统设置 → 通用 → 登录项** 中确认 `ClashBar` 后台项目已被允许；若已允许但仍异常，已先手动关闭再重新开启一次。
          required: true
        - label: 我已执行 `Restart` 清理运行状态后，重新验证问题仍然存在。
          required: true
        - label: 我已在 `Logs` 页面将 `log-level` 调整为 `DEBUG`，并提供了 `~/Library/Application Support/clashbar/logs` 下的完整日志。
          required: true
        - label: 我理解：未附上完整日志的 Issue 将被无条件关闭，不作任何回复。
          required: true
        - label: 我提供了可在本地重现问题的最简配置文件，不包含敏感信息（服务器地址、密码、端口等）。
          required: true

  - type: dropdown
    attributes:
      label: 操作系统
      description: 请提供操作系统类型
      multiple: true
      options:
        - MacOS(M芯片)
        - MacOS(Intel芯片)
  - type: input
    attributes:
      label: 系统版本
      description: 请提供出现问题的操作系统版本
    validations:
      required: true
  - type: textarea
    attributes:
      label: Mihomo 版本
      description: 提供 App 主页左下角的 Mihomo 版本号
    validations:
      required: true
  - type: textarea
    attributes:
      label: ClashBar 版本
      description: 提供 App 主页右下角的版本号
    validations:
      required: true
  - type: textarea
    attributes:
      render: yaml
      label: 配置文件
      description: |-
        在下方附上 Mihomo 配置文件
        请确保配置文件中没有敏感信息（比如：服务器地址，密码，端口等）
        以及确保可以在本地（如果是代理协议问题，请确保本地服务器可用于复现）使用 Mihomo 原始命令行程序重现错误的配置文件
    validations:
      required: true
  - type: textarea
    attributes:
      label: 描述
      description: 请提供错误的详细描述。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 重现方式
      description: 请提供重现错误的步骤
    validations:
      required: true
  - type: textarea
    attributes:
      label: 日志
      description: 在下方附上 Mihomo Core 的运行日志，`log-level` 使用 `DEBUG`
      render: shell
